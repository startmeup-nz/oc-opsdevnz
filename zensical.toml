# ============================================================================
# Zensical Configuration for oc-opsdevnz
#
# This config is tailored for oc-opsdevnz module documentation.
# ============================================================================

[project]

site_name = "oc-opsdevnz"
site_description = "OpenCollective API client and CLI for OpsDev.nz — GraphQL, token resolution, YAML-driven upserts"
site_author = "OpsDev.NZ"
site_url = ""
copyright = "Copyright &copy; 2026 OpsDev.NZ"

nav = [
  { "Getting Started" = "index.md" },
  { "Specification" = "specs/README.md" },
  { "Functional Requirements" = "specs/functional-requirements.md" },
  { "Non-Functional Requirements" = "specs/NFR.md" },
  { "Test Coverage" = "specs/coverage.md" },
  { "Design Decisions" = "design/README.md" },
  { "User Stories" = "stories/README.md" },
  { "Related Tools" = "related-tools.md" },
]

language = "en"

# ----------------------------------------------------------------------------
# Theme Configuration
# ----------------------------------------------------------------------------
[project.theme]
language = "en"

# ----------------------------------------------------------------------------
# Feature Toggles
# ----------------------------------------------------------------------------
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

# ----------------------------------------------------------------------------
# Color Palette
# ----------------------------------------------------------------------------
[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
